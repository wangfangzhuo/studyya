      border: none;
      padding: 0;
      font-family: inherit;

    .word-btn.speaking {

    }

      color: #999;

    }

      color: #555;

      color: #aaa;

      margin-right: 4px;
    }

    .sentence-block {

      border-top: 1px solid #f0f0f0;
    }

    .sentence-btn {

      width: 100%;
      text-align: left;
      background: #f8f8f6;
      border: 1px solid #e8e8e3;
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
      font-size: 13.5px;
      line-height: 1.55;
      margin-bottom: 4px;
      color: #333;
    }

    .sentence-btn:hover { background: #eeeee8; }

    .sentence-btn.speaking {
      background: #fff4ec;
      border-color: #f5c99a;
    }

    .sentence-btn .en {
      display: block;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 3px;
    }

    .sentence-btn .zh {
      display: block;
      color: #888;

    }

    .speak-hint {
      font-size: 11px;
      color: #bbb;
      margin-top: 4px;
    }

      gap: 10px;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .ctrl-label {
      font-size: 13px;
      color: #666;
    }

      font-size: 13px;
      padding: 5px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
    }

      width: 100px;
      padding: 0;
      cursor: pointer;
    }

      padding: 6px 14px;
      font-size: 13px;

      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;

    }

      font-size: 11px;

      margin-left: 6px;

// ── 语音引擎 ────────────────────────────────────────────────────
let selectedVoice = null;

function loadVoices() {
  const voices = window.speechSynthesis.getVoices();
  const sel = document.getElementById('voiceSelect');
  sel.innerHTML = '';
  const en = voices.filter(v => v.lang.startsWith('en'));
  if (en.length === 0) {
    sel.innerHTML = '<option>（使用系统默认）</option>';
    return;
  }
  en.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = v.name.replace('()', '').trim();
    if (v.lang === 'en-US') opt.selected = true;
    sel.appendChild(opt);
  });
  setVoice();
}

function setVoice() {
  const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  const idx = document.getElementById('voiceSelect').value;
  selectedVoice = voices[idx] || null;
}

window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text, btn) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = parseFloat(document.getElementById('rateSlider').value);
  if (selectedVoice) u.voice = selectedVoice;

  if (btn) {
    btn.classList.add('speaking');
    u.onend = () => btn.classList.remove('speaking');
    u.onerror = () => btn.classList.remove('speaking');
  }
  window.speechSynthesis.speak(u);
}

// ── 渲染卡片 ────────────────────────────────────────────────────
function renderWords(containerId, words) {
  const container = document.getElementById(containerId);
  words.forEach(item => {
    const card = document.createElement('div');
    card.className = 'word-card';

    // 上半部分：单词 + 音标 + 词性词义
    const top = document.createElement('div');
    top.className = 'word-top';

    const wordBtn = document.createElement('button');
    wordBtn.className = 'word-btn';
    wordBtn.textContent = item.word;
    wordBtn.title = '点击朗读单词';
    wordBtn.onclick = () => speak(item.word, wordBtn);

    const ph = document.createElement('span');
    ph.className = 'phonetic';
    ph.textContent = item.phonetic;

    const pm = document.createElement('span');
    pm.className = 'pos-meaning';
    pm.innerHTML = `<span class="pos">${item.pos}</span>${item.meaning}`;

    top.appendChild(wordBtn);
    top.appendChild(ph);
    top.appendChild(pm);
    card.appendChild(top);

    // 例句
    const sBlock = document.createElement('div');
    sBlock.className = 'sentence-block';

    item.sentences.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'sentence-btn';
      btn.title = '点击朗读整句';
      btn.innerHTML = `<span class="en">${s.en}</span><span class="zh">${s.zh}</span>`;
      btn.onclick = () => speak(s.en, btn);
      sBlock.appendChild(btn);
    });

    const hint = document.createElement('div');
    hint.className = 'speak-hint';
    hint.textContent = '▲ 点击句子框可朗读整句';
    sBlock.appendChild(hint);

    card.appendChild(sBlock);
    container.appendChild(card);
  });
}

renderWords('words-day1', vocab.day1);
renderWords('words-day2', vocab.day2);
